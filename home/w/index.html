<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BIGFISH_WATCH_HUD</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    
    <style>
        :root {
            --bg-deep: #050505;
            --accent-cyan: #00f0ff;
            --accent-purple: #bc13fe;
            --accent-green: #05ffa1;
            --accent-red: #ff2a6d;
            --text-primary: #e0e0e0;
            --text-secondary: #8b9bb4;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: var(--font-mono);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #ambient {
            position: fixed; inset: 0; z-index: 1;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
            pointer-events: none;
        }

        #hud-core {
            position: relative;
            z-index: 10;
            display: none; /* Hidden until auth */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 10px;
        }

        .visualizer-wrapper {
            position: relative;
            width: 85vmin; 
            height: 85vmin;
            max-width: 250px;
            max-height: 250px;
            border-radius: 50%;
            overflow: hidden;
            border: 2px solid rgba(0, 240, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            background: #000;
            transition: all 0.5s ease;
        }

        video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            transition: opacity 1s, filter 0.8s;
            filter: brightness(0.8) contrast(1.2);
        }

        .hidden { opacity: 0 !important; pointer-events: none !important; }

        .ai-status-overlay {
            margin-top: 15px;
            text-align: center;
            width: 100%;
        }

        #ai-state-text {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            text-transform: uppercase;
        }

        #ai-sub-text {
            font-size: 9px;
            color: var(--text-secondary);
            margin-top: 4px;
            display: block;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 80%;
            margin-left: 10%;
        }

        .state-thinking { filter: brightness(1.2) contrast(1.5) hue-rotate(270deg) drop-shadow(0 0 15px var(--accent-purple)) !important; }
        .state-speaking { filter: brightness(1.1) contrast(1.3) hue-rotate(90deg) drop-shadow(0 0 15px var(--accent-green)) !important; }
        .state-error { filter: grayscale(1) brightness(0.5) drop-shadow(0 0 10px var(--accent-red)) !important; }

        /* AUTH OVERLAY */
        #auth-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }
        .auth-box {
            width: 100%; max-width: 280px;
            text-align: center;
        }
        .auth-input {
            width: 100%; padding: 12px; margin-bottom: 10px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(0,240,255,0.2);
            color: #fff; border-radius: 8px; font-family: var(--font-mono);
            text-align: center; font-size: 14px;
        }
        .auth-btn {
            width: 100%; padding: 12px;
            background: var(--accent-cyan); color: #000; border: none;
            border-radius: 8px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; font-size: 12px;
        }
        .auth-error { color: var(--accent-red); font-size: 10px; margin-top: 10px; display: none; }

        /* INITIALIZE OVERLAY */
        #wake-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: #000;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .pulse-logo {
            width: 50px; height: 50px;
            border: 2px solid var(--accent-cyan);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 0 15px var(--accent-cyan);
            animation: breathe 2s infinite;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body>

    <div id="ambient"></div>

    <!-- 1. AUTH SCREEN -->
    <div id="auth-overlay">
        <div class="auth-box">
            <div style="margin-bottom: 20px; font-size: 14px; letter-spacing: 3px; color: var(--accent-cyan);">SECURITY_UPLINK</div>
            <input type="password" id="auth-pass" class="auth-input" placeholder="PASSCODE" autofocus>
            <button id="auth-btn" class="auth-btn">AUTHORIZE</button>
            <div id="auth-err" class="auth-error">INVALID_ACCESS_KEY</div>
        </div>
    </div>

    <!-- 2. WAKE SCREEN (Audio Context Unlock) -->
    <div id="wake-overlay">
        <div class="pulse-logo">🐟</div>
        <div style="font-size: 10px; color: var(--accent-cyan); letter-spacing: 2px;">INITIALIZE_CORE</div>
    </div>

    <!-- 3. MAIN HUD -->
    <div id="hud-core">
        <div class="visualizer-wrapper" id="orb">
            <video id="video-active" autoplay muted playsinline></video>
            <video id="video-buffer" class="hidden" muted playsinline></video>
        </div>

        <div class="ai-status-overlay">
            <h2 id="ai-state-text">IDLE</h2>
            <span id="ai-sub-text">Bigfish Node Online.</span>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA6sANvYoAkXHYG8MjbZl6Pyq23CNdBuzA",
            authDomain: "community-canvas-255fa.firebaseapp.com",
            databaseURL: "https://community-canvas-255fa-default-rtdb.firebaseio.com",
            projectId: "community-canvas-255fa"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        const videoActive = document.getElementById('video-active');
        const videoBuffer = document.getElementById('video-buffer');
        const orb = document.getElementById('orb');
        const stateText = document.getElementById('ai-state-text');
        const subText = document.getElementById('ai-sub-text');
        const wakeOverlay = document.getElementById('wake-overlay');
        const authOverlay = document.getElementById('auth-overlay');
        const authBtn = document.getElementById('auth-btn');
        const authPass = document.getElementById('auth-pass');
        const authErr = document.getElementById('auth-err');
        const hudCore = document.getElementById('hud-core');

        const ASSETS = {
            'IDLE': 'fish_idle.mp4',
            'THINKING': 'fish_thinking.mp4',
            'SPEAKING': 'fish_idle.mp4'
        };

        const ADMIN_EMAIL = "successadhikari1234@gmail.com";
        let isAlive = false;
        let currentState = 'IDLE';

        // --- AUTH LOGIC ---
        authBtn.onclick = () => attemptAuth();
        authPass.onkeypress = (e) => { if(e.key === 'Enter') attemptAuth(); };

        function attemptAuth() {
            const pass = authPass.value;
            if(!pass) return;
            authBtn.disabled = true;
            authBtn.textContent = "VERIFYING...";
            authErr.style.display = 'none';

            auth.signInWithEmailAndPassword(ADMIN_EMAIL, pass)
                .catch(err => {
                    authErr.style.display = 'block';
                    authBtn.disabled = false;
                    authBtn.textContent = "AUTHORIZE";
                });
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                authOverlay.style.display = 'none';
                wakeOverlay.style.display = 'flex';
            } else {
                authOverlay.style.display = 'flex';
                wakeOverlay.style.display = 'none';
                hudCore.style.display = 'none';
            }
        });

        // --- CORE LOGIC ---
        wakeOverlay.onclick = () => {
            wakeOverlay.style.display = 'none';
            hudCore.style.display = 'flex';
            initAI();
        };

        function initAI() {
            isAlive = true;
            videoActive.src = ASSETS['IDLE'];
            videoActive.play();
            videoActive.onended = () => { videoActive.currentTime = 0; videoActive.play(); };

            startListening();
            syncServer();
        }

        function setVisualState(state) {
            state = state.toUpperCase();
            if (state === currentState) return;
            
            currentState = state;
            stateText.textContent = state;
            
            orb.style.borderColor = "rgba(0, 240, 255, 0.3)";
            orb.style.boxShadow = "0 0 30px rgba(0, 240, 255, 0.2)";
            videoActive.className = "";

            if (state === 'THINKING') {
                videoActive.classList.add('state-thinking');
                orb.style.borderColor = "var(--accent-purple)";
                orb.style.boxShadow = "0 0 30px rgba(188, 19, 254, 0.3)";
                subText.textContent = "Neural Processing...";
            } else if (state === 'SPEAKING') {
                videoActive.classList.add('state-speaking');
                orb.style.borderColor = "var(--accent-green)";
                orb.style.boxShadow = "0 0 30px rgba(5, 255, 161, 0.3)";
                subText.textContent = "Transmitting Audio...";
            } else {
                subText.textContent = "Uplink Secure.";
            }

            const targetSrc = ASSETS[state] || ASSETS['IDLE'];
            if (!videoActive.src.endsWith(targetSrc)) {
                videoBuffer.src = targetSrc;
                videoBuffer.play().then(() => {
                    videoBuffer.classList.remove('hidden');
                    videoActive.classList.add('hidden');
                    setTimeout(() => {
                        videoActive.src = targetSrc;
                        videoActive.classList.remove('hidden');
                        videoBuffer.classList.add('hidden');
                    }, 800);
                });
            }
        }

        function startListening() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Speech) return;

            const recognition = new Speech();
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                subText.textContent = text;
                if (e.results[0].isFinal) sendToBigfish(text);
            };
            recognition.onend = () => { if (isAlive) recognition.start(); };
            recognition.onerror = () => { if (isAlive) setTimeout(() => recognition.start(), 1000); };
            recognition.start();
        }

        function syncServer() {
            db.ref('home_system/server_info/ai_status').on('value', s => {
                setVisualState(s.val() || 'IDLE');
            });
        }

        function sendToBigfish(text) {
            const lower = text.trim().toLowerCase();
            const WAKE_WORD = "hey bigfish";
            const WAKE_WORD_ALT = "hey big fish";
            
            let command = "";
            if (lower.startsWith(WAKE_WORD)) {
                command = text.substring(WAKE_WORD.length).trim();
            } else if (lower.startsWith(WAKE_WORD_ALT)) {
                command = text.substring(WAKE_WORD_ALT.length).trim();
            }

            if (!command) return;
            
            console.log("[WATCH] Command Detected:", command);

            // Immediate feedback
            if (command.toLowerCase().includes("stop")) {
                db.ref('home_system/server_info/stop_requested').set(true);
            }

            db.ref('home_system/commands').push({
                type: 'user_input',
                command: command,
                source: 'watch_node',
                timestamp: Date.now()
            });
        }
    </script>
</body>
</html>
